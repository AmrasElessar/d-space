# SPDX-License-Identifier: GPL-3.0-or-later
#
# D-Space E2E — Sprint 3.5 (Bölüm 20.4 e2e gate scaffolding).
#
# Şu an `web` projesi zorunlu — Vite dev server + Tauri IPC mock üzerinden
# UI akış smoke testleri koşar. Hızlı feedback (~30 sn).
#
# `webdriver` projesi (gerçek Tauri build + tauri-driver) v0.2.0-beta
# sonrası eklenecek — `cargo install tauri-driver` + `pnpm tauri build
# --debug` + ayrı job. Performans ve EV cert validate'i için.
#
# Şimdilik `continue-on-error: true` — testler regresyon yakalamayı
# öğrenirken main'i bloklamasın. v0.2.0 sonrası "required check" olarak
# bağlanacak.

name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-web:
    name: Playwright web · ubuntu-latest
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node 22 + pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: pnpm install --frozen-lockfile
        run: pnpm install --frozen-lockfile

      - name: Playwright browsers (chromium)
        run: pnpm test:e2e:install

      - name: pnpm test:e2e --project=web
        run: pnpm test:e2e --project=web --reporter=github

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
